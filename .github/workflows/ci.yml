name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux GCC
            os: ubuntu-latest
            cmake_args: ""

          - name: macOS Clang
            os: macos-latest
            cmake_args: "-DCMAKE_OSX_ARCHITECTURES=x86_64"

          - name: Windows MSVC x86
            os: windows-latest
            cmake_args: "-A Win32"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -S . ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --config Release

      - name: Run tests
        run: ctest --test-dir build --build-config Release --output-on-failure